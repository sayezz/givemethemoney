services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-tracker_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-investment_tracker}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - givemethemoney_net
    ports:
      - "5433:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tracker_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DB_NAME: ${DB_NAME:-investment_tracker}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      FMP_API_KEY: ${FMP_API_KEY:-}
      AV_API_KEY: ${AV_API_KEY:-}
      SMTP_URL: ${SMTP_URL:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    ports:
      - "3001:3001"
    depends_on:
      - db
    networks:
      - givemethemoney_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - givemethemoney_net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - db
    networks:
      - givemethemoney_net
    restart: unless-stopped

volumes:
  db_data:

networks:
  givemethemoney_net:
