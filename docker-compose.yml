# Production / "customer" configuration.
# Bare `docker compose up` starts the clean setup: only the frontend is exposed,
# the database is not reachable from the host, and no admin tooling is included.
#
# Developers add the extra tooling (pgAdmin, exposed DB/backend ports) with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-tracker_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-investment_tracker}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - givemethemoney_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tracker_user} -d ${DB_NAME:-investment_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tracker_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DB_NAME: ${DB_NAME:-investment_tracker}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      FMP_API_KEY: ${FMP_API_KEY:-}
      AV_API_KEY: ${AV_API_KEY:-}
      SMTP_URL: ${SMTP_URL:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    # Not published to the host: the frontend reverse-proxies /api internally.
    depends_on:
      db:
        condition: service_healthy
    networks:
      - givemethemoney_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - givemethemoney_net
    restart: unless-stopped

volumes:
  db_data:

networks:
  givemethemoney_net:
